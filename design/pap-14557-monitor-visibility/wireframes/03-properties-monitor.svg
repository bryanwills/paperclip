<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" fill="#fff" stroke="#000" stroke-width="1.5" font-family="-apple-system, system-ui, sans-serif" viewBox="0 0 1280 800"><rect width="1280" height="800" x="0" y="0"/><text x="48" y="56" fill="#000" stroke="none" font-size="20" font-weight="600">Properties pane — Monitor row redesign</text><text x="48" y="80" fill="#666" stroke="none" font-size="12">Side pane fragment, 352px wide. The same row is reused in the mobile properties sheet.</text><text x="48" y="128" fill="#000" stroke="none" font-size="14" font-weight="600">A · Current — cramped, truncated</text><g transform="translate(48,144)"><rect width="352" height="176" rx="8"/><text x="16" y="44" fill="#666" stroke="none" font-size="12">Approvers</text><text x="144" y="44" fill="#666" stroke="none" font-size="14">None</text><text x="16" y="84" fill="#666" stroke="none" font-size="12">Monitor</text><circle cx="152" cy="80" r="7"/><line x1="152" x2="152" y1="80" y2="75"/><line x1="152" x2="156" y1="80" y2="80"/><text x="168" y="84" fill="#000" stroke="none" font-size="14">Ne…</text><text x="208" y="84" fill="#666" stroke="none" font-size="12">Jul 17, 2026</text><text x="288" y="76" fill="#666" stroke="none" font-size="12">Attempt</text><text x="288" y="92" fill="#666" stroke="none" font-size="12">1</text><text x="16" y="124" fill="#666" stroke="none" font-size="12">Watchdog</text><text x="144" y="124" fill="#666" stroke="none" font-size="14">None</text></g><text x="48" y="352" fill="#666" stroke="none" font-size="12">Label truncates to “Ne…”, date is ambiguous (which year matters,</text><text x="48" y="368" fill="#666" stroke="none" font-size="12">not the time?), attempt badge wraps into two lines.</text><text x="464" y="128" fill="#000" stroke="none" font-size="14" font-weight="600">B · Proposed — two-line row</text><g transform="translate(464,144)"><rect width="352" height="176" rx="8"/><text x="16" y="44" fill="#666" stroke="none" font-size="12">Approv